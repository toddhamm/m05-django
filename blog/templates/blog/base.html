{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Todd's blog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!--<link rel="stylesheet" href="{% static '/css/blog.css' %}">-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lobster&subset=latin,latin-ext">
    <style>
        body {
            padding-left: 15px;
        }
        h1 a, h2 a {
            color: #C25100;
            font-family: 'Lobster';
        }
        .page-header {
            background-color: #C25100;
            margin-top: 0;
            margin-bottom: 40px;
            padding: 20px 20px 20px 40px;
        }

        .page-header h1,
        .page-header h1 a,
        .page-header h1 a:visited,
        .page-header h1 a:active {
            color: #ffffff;
            font-size: 36pt;
            text-decoration: none;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Lobster', cursive;
        }

        .date {
            color: #828282;
        }

        .save {
            float: right;
        }

        .post-form textarea,
        .post-form input {
            width: 100%;
        }

        .top-menu,
        .top-menu:hover,
        .top-menu:visited {
            color: #ffffff;
            float: right;
            font-size: 26pt;
            margin-right: 20px;
        }

        .post {
            margin-bottom: 70px;
        }

        .post h2 a,
        .post h2 a:visited {
            color: #000000;
        }

        .post > .date,
        .post > .actions {
            float: right;
        }

        .btn-secondary,
        .btn-secondary:visited {
            color: #C25100;
            background: none;
            border-color: #C25100;
            margin-left: 15px;
        }

        .btn-secondary:hover {
            color: #FFFFFF;
            background-color: #C25100;
        }
    </style>
</head>
<body>
    <header class="page-header">
      <div class="container">
          <h1><a href="/">Todd's Blog</a></h1>
      </div>
    </header>
    <main class="container">
        <div class="row">
            <div class="col">
            {% block content %}
            {% endblock %}
            </div>
        </div>
    </main>
</body>
</html>
